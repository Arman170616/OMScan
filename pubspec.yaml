name: karisma_pos
description: OMScan - Omani Mobile POS System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # QR Code generation
  qr_flutter: ^4.1.0

  # Bluetooth thermal printer
  print_bluetooth_thermal: ^1.1.2

  # Fonts & icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Animations
  flutter_animate: ^4.5.0

  # Formatting
  intl: ^0.20.2

  # UUID generation
  uuid: ^4.4.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Barcode / QR scanner
  mobile_scanner: ^5.2.3

  # Local database
  sqflite: ^2.4.0
  path: ^1.9.0

  # PDF invoice generation & sharing
  pdf: ^3.11.3
  printing: ^5.13.1
  path_provider: ^2.1.3

  # Charts for dashboard
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
